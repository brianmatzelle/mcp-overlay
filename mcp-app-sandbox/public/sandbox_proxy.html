<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <title>MCP App Sandbox Proxy</title>
    <style>
      html, body { margin: 0; height: 100vh; width: 100vw; background-color: transparent; }
      body { display: flex; flex-direction: column; }
      * { box-sizing: border-box; }
      iframe {
        background-color: transparent;
        border: 0px none transparent;
        padding: 0px;
        overflow: hidden;
        flex-grow: 1;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <script>
      // MCP Apps sandbox proxy implementing the double-iframe security pattern.
      // Protocol:
      // 1. This proxy loads, sends "ui/notifications/sandbox-proxy-ready" to parent
      // 2. Parent (AppRenderer/AppBridge) sends "ui/notifications/sandbox-resource-ready" with HTML
      // 3. Proxy creates inner iframe with srcdoc = html
      // 4. All subsequent messages are relayed bidirectionally between parent and inner iframe

      let inner = null;

      window.addEventListener('message', (event) => {
        const data = event.data;

        if (event.source === window.parent) {
          // Message from host (AppRenderer/AppBridge)
          if (data && data.method === 'ui/notifications/sandbox-resource-ready') {
            // Receive HTML content and render in inner iframe
            const html = data.params?.html;
            if (typeof html !== 'string') return;

            inner = document.createElement('iframe');
            inner.style = 'width:100%; height:100%; border:none;';
            inner.srcdoc = html;
            document.body.appendChild(inner);
          } else if (inner && inner.contentWindow) {
            // Forward all other host messages to inner iframe
            inner.contentWindow.postMessage(data, '*');
          }
        } else if (inner && event.source === inner.contentWindow) {
          // Forward inner iframe messages to host
          window.parent.postMessage(data, '*');
        }
      });

      // Signal readiness to host
      window.parent.postMessage({
        jsonrpc: '2.0',
        method: 'ui/notifications/sandbox-proxy-ready',
        params: {}
      }, '*');
    </script>
  </body>
</html>
